<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ff5a5f">
  <title>出演料チェッカー（お遊び）</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>出演料チェッカー（お遊び）</h1>

  <label>年齢（20歳以上）</label>
  <input type="number" id="age" min="20">

  <label>身長（cm）</label>
  <input type="number" id="height">

  <label>体重（kg）</label>
  <input type="number" id="weight">

  <label>バスト</label>
  <input type="number" id="bust">

  <label>ウエスト</label>
  <input type="number" id="waist">

  <label>写真スコア（自動算出）</label>
  <input type="number" id="photo" min="0" max="100" readonly>

  <h3>立ち姿写真（任意）</h3>
  <input type="file" id="photoUpload" accept="image/*">

  <canvas id="canvas" style="display:none;"></canvas>

  <h3>対応内容</h3>
  <label><input type="checkbox" value="oral"> フェラ</label>
  <label><input type="checkbox" value="cosplay"> コスプレ</label>
  <label><input type="checkbox" value="deepKiss"> ディープキス</label>
  <label><input type="checkbox" value="foot"> 足フェチ</label>
  <label><input type="checkbox" value="hard"> ハード寄り</label>

  <button onclick="calculate()">診断する</button>

  <div id="result"></div>

  <p class="note">
    ※ 本サービスはエンタメ目的の診断です。<br>
    ※ 写真は端末内で処理され、外部送信されません。<br>
    ※ 顔や個人の魅力を評価するものではありません。
  </p>

  <script src="script.js"></script>
</body>
</html>
